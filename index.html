<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClinicFlow | Secure Portal v2.7</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    body { background-color: #f8fafc; color: #1e293b; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .animate-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .recording-pulse { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const Icon = ({ name, className = "w-5 h-5" }) => {
      useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name, window.lucide]);
      return <i data-lucide={name} className={className}></i>;
    };

    const VERSION = "2.7";
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzuebIKaOUaautJwjjofHMQmuLiJRUy3CP4yRXL42pf7d2spujhvBhu16NnZZA2pJkNdw/exec"; 

    function App() {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [passcode, setPasscode] = useState("");
      const [userApiKey, setUserApiKey] = useState("");
      
      const [view, setView] = useState('list');
      const [patients, setPatients] = useState([]);
      const [selectedPatient, setSelectedPatient] = useState(null);
      const [history, setHistory] = useState({ intakes: [], soapNotes: [] });
      const [isLoading, setIsLoading] = useState(false);
      const [statusMsg, setStatusMsg] = useState(null);

      // Session States
      const [isRecording, setIsRecording] = useState(false);
      const [isPaused, setIsPaused] = useState(false);
      const [transcript, setTranscript] = useState("");
      const [hepPhotos, setHepPhotos] = useState([]); // Array of base64 strings
      const [currentSoap, setCurrentSoap] = useState("");
      const [currentHep, setCurrentHep] = useState([]); // Array of {photo, title, instructions, cues, reps}
      const [activeModel, setActiveModel] = useState("gemini-1.5-flash");

      const recognitionRef = useRef(null);
      const mediaRecorderRef = useRef(null);

      const showToast = (msg) => {
        setStatusMsg(msg);
        setTimeout(() => setStatusMsg(null), 6000);
      };

      useEffect(() => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
          recognitionRef.current = new SpeechRecognition();
          recognitionRef.current.continuous = true;
          recognitionRef.current.interimResults = true;
          recognitionRef.current.onresult = (event) => {
            let final = "";
            for (let i = event.resultIndex; i < event.results.length; ++i) {
              if (event.results[i].isFinal) final += event.results[i][0].transcript;
            }
            setTranscript(prev => prev + final);
          };
        }
      }, []);

      const checkApiCapabilities = async (key) => {
        try {
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
          const json = await res.json();
          if (json.models) {
            const names = json.models.map(m => m.name.split('/').pop());
            const bestFlash = names.find(n => n.includes("flash") && !n.includes("8b")) || names[0];
            setActiveModel(bestFlash);
            return true;
          }
          return false;
        } catch (e) { return false; }
      };

      const handleLogin = async () => {
        if (!userApiKey) return showToast("API Key Required.");
        setIsLoading(true);
        try {
          const res = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'getPatients', passcode })
          });
          const json = await res.json();
          if (json.status === 'success') {
            const aiWorks = await checkApiCapabilities(userApiKey);
            if (aiWorks) {
              setPatients(json.data);
              setIsAuthenticated(true);
            } else showToast("Gemini API Key Invalid.");
          } else showToast("Invalid Clinic Passcode.");
        } catch (e) { showToast("Connection Error."); }
        setIsLoading(false);
      };

      const openPatient = async (p) => {
        setIsLoading(true);
        setSelectedPatient(p);
        try {
          const res = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'getPatientHistory', data: { patientName: p.name }, passcode })
          });
          const json = await res.json();
          if (json.status === 'success') {
            setHistory(json.data);
            setView('detail');
            setTranscript("");
            setCurrentSoap("");
            setCurrentHep([]);
            setHepPhotos([]);
          }
        } catch (e) { showToast("Error loading patient data."); }
        setIsLoading(false);
      };

      const toggleRecording = async () => {
        if (!isRecording) {
          try {
            await navigator.mediaDevices.getUserMedia({ audio: true });
            setTranscript("");
            recognitionRef.current?.start();
            setIsRecording(true);
          } catch (e) { alert("Mic required."); }
        } else {
          recognitionRef.current?.stop();
          setIsRecording(false);
        }
      };

      const generateSOAP = async () => {
        if (!transcript) return showToast("Nothing recorded.");
        setIsLoading(true);
        try {
          const latestIntake = history.intakes.length > 0 ? history.intakes[history.intakes.length - 1].summary : "N/A";
          const prompt = `Act as an expert Physical Therapist. Generate a professional clinical SOAP note based on this transcript. 
          Context: ${latestIntake}
          Transcript: ${transcript}`;
          
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${activeModel}:generateContent?key=${userApiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
          });
          const json = await res.json();
          if (json.candidates?.[0]?.content?.parts?.[0]?.text) {
            setCurrentSoap(json.candidates[0].content.parts[0].text);
            showToast("Note Generated.");
          }
        } catch (e) { showToast(`AI Error: ${e.message}`); }
        setIsLoading(false);
      };

      const generateHEP = async () => {
        if (hepPhotos.length === 0) return showToast("Upload movement photos first.");
        setIsLoading(true);
        try {
          const latestIntake = history.intakes.length > 0 ? history.intakes[history.intakes.length - 1].summary : "N/A";
          
          const parts = [
            { text: `Act as a Physical Therapist. I have provided ${hepPhotos.length} photos of exercises taught today. 
              Create a structured Home Exercise Program (HEP) guide by analyzing these images and the session talk.
              
              CONTEXT:
              Patient Background: ${latestIntake}
              Session Transcript: ${transcript}
              
              OUTPUT REQUIREMENT:
              You MUST return a JSON object with a key "exercises" which is an array of ${hepPhotos.length} objects.
              Each object must correspond to the images provided in order and contain:
              "title": (Name of exercise)
              "instructions": (Patient-friendly steps)
              "reps": (Sets/Reps scheme mentioned in talk or clinical best guess)
              "cues": (Specific cues mentioned in the transcript)
              
              Respond ONLY with the raw JSON.` }
          ];

          hepPhotos.forEach(data => parts.push({ inlineData: { mimeType: "image/png", data: data.split(',')[1] } }));

          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${activeModel}:generateContent?key=${userApiKey}`, {
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
              contents: [{ parts }],
              generationConfig: { responseMimeType: "application/json" }
            })
          });
          const json = await res.json();
          const rawText = json.candidates?.[0]?.content?.parts?.[0]?.text;
          const parsed = JSON.parse(rawText);
          
          // Map the AI text back to the original photos
          const fullHepData = parsed.exercises.map((ex, i) => ({
            ...ex,
            photo: hepPhotos[i]
          }));

          setCurrentHep(fullHepData);
          showToast("Visual HEP Guide Constructed.");
        } catch (e) { 
          showToast(`HEP Error: ${e.message}`); 
          console.error(e);
        }
        setIsLoading(false);
      };

      const handlePhotoUpload = (e) => {
        Array.from(e.target.files).forEach(file => {
          const r = new FileReader();
          r.onload = () => setHepPhotos(p => [...p, r.result]);
          r.readAsDataURL(file);
        });
      };

      const printHEP = () => {
        const win = window.open('', '_blank');
        const content = `
          <html>
            <head>
              <title>HEP Guide - ${selectedPatient.name}</title>
              <style>
                body { font-family: -apple-system, sans-serif; padding: 40px; color: #1e293b; max-width: 800px; margin: auto; }
                h1 { border-bottom: 4px solid #3b82f6; padding-bottom: 10px; margin-bottom: 30px; text-transform: uppercase; letter-spacing: -1px; }
                .exercise-card { display: flex; gap: 25px; margin-bottom: 40px; page-break-inside: avoid; border-bottom: 1px solid #e2e8f0; padding-bottom: 30px; }
                .photo { width: 250px; height: 250px; object-fit: cover; border-radius: 12px; border: 1px solid #cbd5e1; }
                .details { flex: 1; }
                .title { font-size: 20px; font-weight: 800; margin-bottom: 8px; color: #2563eb; }
                .reps { font-weight: 700; color: #64748b; font-size: 14px; text-transform: uppercase; margin-bottom: 15px; }
                .label { font-size: 10px; font-weight: 900; text-transform: uppercase; color: #94a3b8; margin-top: 15px; display: block; }
                .text { font-size: 14px; line-height: 1.6; margin: 4px 0; }
                .cues { background: #f8fafc; padding: 10px; border-radius: 8px; font-style: italic; border-left: 4px solid #3b82f6; margin-top: 10px; }
              </style>
            </head>
            <body>
              <div style="display:flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px;">
                <h1>Home Exercise Program</h1>
                <p style="font-weight:bold; color:#94a3b8;">${new Date().toLocaleDateString()}</p>
              </div>
              <p style="margin-bottom: 40px;">Patient: <b>${selectedPatient.name}</b></p>
              ${currentHep.map(ex => `
                <div class="exercise-card">
                  <img src="${ex.photo}" class="photo" />
                  <div class="details">
                    <div class="title">${ex.title}</div>
                    <div class="reps">${ex.reps}</div>
                    <span class="label">Instructions</span>
                    <p class="text">${ex.instructions}</p>
                    <span class="label">Key Cues / Watch For</span>
                    <div class="cues text">${ex.cues}</div>
                  </div>
                </div>
              `).join('')}
              <div style="margin-top: 60px; text-align: center; color: #94a3b8; font-size: 10px; text-transform: uppercase; letter-spacing: 2px;">
                Generated by ClinicFlow Intelligence Hub
              </div>
            </body>
          </html>
        `;
        win.document.write(content);
        win.document.close();
        setTimeout(() => win.print(), 500);
      };

      if (!isAuthenticated) return (
        <div className="h-screen flex items-center justify-center bg-slate-900 p-6">
          <div className="bg-white p-12 rounded-[3.5rem] shadow-2xl w-full max-md animate-in">
            <h1 className="text-3xl font-black mb-1 italic tracking-tighter text-center">Clinic<span className="text-blue-600">Flow</span></h1>
            <p className="text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] mb-10 text-center">Secure Documentation • v{VERSION}</p>
            <div className="space-y-4">
              <input type="password" placeholder="Clinic Passcode" className="w-full p-4 rounded-2xl border-2 text-center font-bold bg-slate-50 outline-none focus:border-blue-500" value={passcode} onChange={e => setPasscode(e.target.value)} />
              <input type="password" placeholder="Gemini API Key" className="w-full p-4 rounded-2xl border-2 text-center text-xs font-mono bg-slate-50 outline-none focus:border-blue-500" value={userApiKey} onChange={e => setUserApiKey(e.target.value)} />
              <button onClick={handleLogin} className="w-full py-5 bg-blue-600 text-white rounded-[2rem] font-black uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-all">Verify & Enter</button>
            </div>
          </div>
        </div>
      );

      return view === 'list' ? (
        <div className="max-w-4xl mx-auto py-24 px-8 animate-in">
          <div className="flex justify-between items-center mb-16">
            <h1 className="text-5xl font-black tracking-tighter uppercase italic">Clinic<span className="text-blue-600">Flow</span></h1>
            <div className="bg-emerald-50 text-emerald-600 px-4 py-2 rounded-full text-[9px] font-black uppercase flex items-center gap-2">
              <span className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> Systems Active
            </div>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
            {patients.map(p => (
              <div key={p.name} onClick={()=>openPatient(p)} className="bg-white p-10 rounded-[3.5rem] shadow-sm border border-slate-100 hover:border-blue-500 transition-all cursor-pointer group active:scale-95">
                <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-[2rem] flex items-center justify-center font-black text-2xl mb-8 group-hover:bg-blue-600 group-hover:text-white transition-colors">{p.name[0]}</div>
                <h3 className="font-black text-2xl tracking-tight">{p.name}</h3>
                <p className="text-xs text-blue-500 font-bold uppercase tracking-widest mt-2">{p.email}</p>
              </div>
            ))}
          </div>
        </div>
      ) : (
        <div className="h-screen flex flex-col overflow-hidden animate-in">
          <header className="bg-white border-b px-8 py-4 flex justify-between items-center shrink-0">
            <div className="flex items-center gap-4">
              <button onClick={() => setView('list')} className="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-xl hover:bg-slate-100 transition-all"><Icon name="arrow-left"/></button>
              <div><h2 className="text-xl font-bold tracking-tight">{selectedPatient.name}</h2><p className="text-[10px] text-blue-500 uppercase font-bold tracking-widest">{selectedPatient.email}</p></div>
            </div>
            
            <div className="flex gap-2">
               <div className="flex bg-slate-100 p-1 rounded-2xl">
                <button onClick={toggleRecording} className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${isRecording ? 'bg-red-500 text-white shadow-lg' : 'bg-blue-600 text-white'}`}>
                  <Icon name={isRecording ? "square" : "mic"} className="w-4 h-4"/>
                </button>
              </div>
              {!isRecording && transcript && (
                <button onClick={generateSOAP} disabled={isLoading} className="bg-slate-900 text-white px-6 py-2 h-10 rounded-xl text-xs font-bold uppercase shadow-lg disabled:opacity-50">Generate SOAP</button>
              )}
            </div>
          </header>

          <main className="flex-1 flex overflow-hidden">
            <aside className="w-4/12 bg-white border-r p-6 overflow-y-auto custom-scrollbar">
              <h3 className="text-[10px] font-black uppercase text-slate-400 mb-4 tracking-widest">Clinical Baseline</h3>
              <div className="bg-slate-50 p-5 rounded-2xl text-sm leading-relaxed text-slate-600 mb-8 whitespace-pre-wrap border border-slate-100 shadow-inner min-h-[100px]">
                {history.intakes.length > 0 ? (
                  <>
                    <div className="text-[9px] font-black text-blue-400 mb-2 uppercase">Latest Assessment</div>
                    {history.intakes[history.intakes.length - 1].summary}
                  </>
                ) : (
                  <div className="text-slate-300 italic py-4">No assessment found.</div>
                )}
              </div>
              <h3 className="text-[10px] font-black uppercase text-slate-400 mb-4 tracking-widest">Chart History</h3>
              {history.soapNotes.map((n, i) => (<div key={i} className="p-3 border border-slate-100 rounded-xl mb-3 text-xs italic text-slate-400 bg-white">"{n.content}"</div>))}
            </aside>

            <div className="flex-1 p-8 overflow-y-auto custom-scrollbar space-y-8 bg-slate-50/50">
              {isRecording && (
                <div className="bg-white p-12 rounded-[3rem] border-2 border-dashed border-red-200 flex flex-col items-center justify-center animate-in">
                  <div className="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mb-6 recording-pulse">
                    <Icon name="mic" className="w-8 h-8 text-red-600" />
                  </div>
                  <h3 className="text-xl font-bold text-slate-800 tracking-tight">Capturing Session Findings...</h3>
                  <p className="text-xs text-slate-400 italic mt-4 text-center max-w-sm">"{transcript.slice(-120) || 'Waiting for clinical findings...'}"</p>
                </div>
              )}

              {currentSoap && (
                <div className="bg-white rounded-3xl border shadow-xl overflow-hidden animate-in">
                  <div className="p-4 border-b flex justify-between bg-white items-center">
                    <span className="text-xs font-black uppercase text-slate-400 tracking-widest">Generated SOAP Note</span>
                    <button onClick={()=>{
                      fetch(SCRIPT_URL, {method:'POST', body: JSON.stringify({action:'saveSoapNote', passcode, data:{patientName:selectedPatient.name, content:currentSoap}})})
                      .then(()=>showToast("Logged to Sheet"));
                    }} className="bg-emerald-600 text-white px-5 py-2 rounded-xl text-[10px] font-bold uppercase shadow-lg">Commit to Chart</button>
                  </div>
                  <textarea value={currentSoap} onChange={e=>setCurrentSoap(e.target.value)} className="w-full h-96 p-8 outline-none text-sm text-slate-700 leading-relaxed font-medium custom-scrollbar"/>
                </div>
              )}

              {/* Visual HEP Sequencer */}
              <div className="bg-white p-8 rounded-[2.5rem] border shadow-sm">
                <div className="flex justify-between items-center mb-8">
                  <h3 className="font-bold text-slate-800 tracking-tight">HEP Visual Sequencer</h3>
                  <button onClick={()=>document.getElementById('upl').click()} className="bg-blue-50 text-blue-600 px-5 py-2 rounded-xl text-[10px] font-bold uppercase flex items-center gap-2 hover:bg-blue-100 transition-all"><Icon name="camera" className="w-3 h-3"/> Upload Movement</button>
                  <input id="upl" type="file" hidden multiple accept="image/*" onChange={handlePhotoUpload}/>
                </div>
                <div className="grid grid-cols-4 gap-4 mb-8">
                  {hepPhotos.map((p, i) => (
                    <div key={i} className="relative group animate-in">
                      <img src={p} className="aspect-square object-cover rounded-2xl border border-slate-100 shadow-sm"/>
                      <button onClick={()=>setHepPhotos(prev=>prev.filter((_, idx)=>idx!==i))} className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity shadow-lg"><Icon name="x" className="w-3 h-3"/></button>
                    </div>
                  ))}
                  {hepPhotos.length === 0 && <div className="col-span-4 py-12 text-center text-slate-300 text-xs font-bold uppercase tracking-widest border-2 border-dashed border-slate-100 rounded-3xl">No movements uploaded</div>}
                </div>
                {hepPhotos.length > 0 && currentHep.length === 0 && (
                  <button onClick={generateHEP} disabled={isLoading} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold text-xs uppercase tracking-widest shadow-lg active:scale-[0.98] transition-all disabled:opacity-50">
                    Construct Visual Guide
                  </button>
                )}
              </div>

              {/* NEW: Visual HEP Results Grid */}
              {currentHep.length > 0 && (
                <div className="space-y-6 animate-in">
                  <div className="flex justify-between items-center">
                    <h3 className="text-xs font-black uppercase text-slate-400 tracking-widest">Personal Exercise Program</h3>
                    <button onClick={printHEP} className="bg-blue-600 text-white px-6 py-2 rounded-xl text-[10px] font-bold uppercase shadow-lg flex items-center gap-2"><Icon name="printer" className="w-3 h-3"/> Print Guide</button>
                  </div>
                  
                  <div className="grid grid-cols-1 gap-6">
                    {currentHep.map((ex, i) => (
                      <div key={i} className="bg-white rounded-[2.5rem] border border-blue-100 shadow-xl overflow-hidden flex gap-8 p-8 transition-all hover:border-blue-400">
                        <img src={ex.photo} className="w-48 h-48 object-cover rounded-3xl border border-slate-100 shadow-sm shrink-0"/>
                        <div className="flex-1 space-y-4">
                          <input 
                            value={ex.title} 
                            onChange={(e) => {
                              const next = [...currentHep];
                              next[i].title = e.target.value;
                              setCurrentHep(next);
                            }}
                            className="text-xl font-black text-blue-600 outline-none w-full bg-transparent border-b border-transparent focus:border-blue-200"
                          />
                          <div>
                             <span className="text-[9px] font-black uppercase text-slate-400 block mb-1">Dosing</span>
                             <input 
                              value={ex.reps} 
                              onChange={(e) => {
                                const next = [...currentHep];
                                next[i].reps = e.target.value;
                                setCurrentHep(next);
                              }}
                              className="font-bold text-slate-700 outline-none w-full bg-slate-50 p-2 rounded-lg text-sm"
                            />
                          </div>
                          <div>
                             <span className="text-[9px] font-black uppercase text-slate-400 block mb-1">Clinical Instructions</span>
                             <textarea 
                                value={ex.instructions} 
                                onChange={(e) => {
                                  const next = [...currentHep];
                                  next[i].instructions = e.target.value;
                                  setCurrentHep(next);
                                }}
                                className="text-sm text-slate-600 leading-relaxed outline-none w-full bg-transparent resize-none h-20"
                             />
                          </div>
                          <div className="p-4 bg-blue-50/50 rounded-2xl border border-blue-100/50">
                             <span className="text-[9px] font-black uppercase text-blue-400 block mb-1">Key Cues (Watch For)</span>
                             <textarea 
                                value={ex.cues} 
                                onChange={(e) => {
                                  const next = [...currentHep];
                                  next[i].cues = e.target.value;
                                  setCurrentHep(next);
                                }}
                                className="text-sm text-blue-800 italic outline-none w-full bg-transparent resize-none h-12"
                             />
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                  <button onClick={()=>setCurrentHep([])} className="w-full py-4 text-[10px] font-black uppercase text-slate-400 hover:text-red-500 transition-colors">Clear and Restart Program</button>
                </div>
              )}
            </div>
          </main>
          {isLoading && <div className="fixed inset-0 bg-white/80 backdrop-blur-sm z-[300] flex items-center justify-center flex-col gap-4 font-black text-blue-600 animate-pulse tracking-widest uppercase text-[10px]"><Icon name="loader-2" className="animate-spin w-10 h-10"/> Synchronizing Intelligence...</div>}
          {statusMsg && <div className="fixed bottom-10 right-10 bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl z-[300] text-[10px] font-black uppercase border border-slate-700 animate-in tracking-widest leading-relaxed">{statusMsg}</div>}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

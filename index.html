<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClinicFlow | Secure Portal v3.0</title>
  <!-- Fixed Dependencies -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    body { background-color: #f8fafc; color: #1e293b; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .animate-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .recording-pulse { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const Icon = ({ name, className = "w-5 h-5" }) => {
      useEffect(() => { 
        if (window.lucide) {
          try { window.lucide.createIcons(); } catch (e) {}
        }
      }, [name]);
      return <i data-lucide={name} className={className}></i>;
    };

    // --- CONFIGURATION ---
    const VERSION = "3.0";
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzuebIKaOUaautJwjjofHMQmuLiJRUy3CP4yRXL42pf7d2spujhvBhu16NnZZA2pJkNdw/exec"; 

    function App() {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [passcode, setPasscode] = useState("");
      const [userApiKey, setUserApiKey] = useState("");
      
      const [view, setView] = useState('list');
      const [patients, setPatients] = useState([]);
      const [selectedPatient, setSelectedPatient] = useState(null);
      const [history, setHistory] = useState({ intakes: [], soapNotes: [] });
      const [isLoading, setIsLoading] = useState(false);
      const [statusMsg, setStatusMsg] = useState(null);

      // Session States
      const [isRecording, setIsRecording] = useState(false);
      const [transcript, setTranscript] = useState("");
      // Using unique IDs for slots to prevent rendering issues
      const [hepPairs, setHepPairs] = useState([{ id: 'init-1', start: null, end: null }]);
      const [currentSoap, setCurrentSoap] = useState("");
      const [currentHep, setCurrentHep] = useState([]); 
      const [activeModel, setActiveModel] = useState("gemini-1.5-flash");

      const recognitionRef = useRef(null);

      const showToast = (msg) => {
        setStatusMsg(msg);
        setTimeout(() => setStatusMsg(null), 6000);
      };

      useEffect(() => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
          recognitionRef.current = new SpeechRecognition();
          recognitionRef.current.continuous = true;
          recognitionRef.current.interimResults = true;
          recognitionRef.current.onresult = (event) => {
            let final = "";
            for (let i = event.resultIndex; i < event.results.length; ++i) {
              if (event.results[i].isFinal) final += event.results[i][0].transcript;
            }
            setTranscript(prev => prev + final);
          };
        }
      }, []);

      const checkApiCapabilities = async (key) => {
        try {
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
          const json = await res.json();
          if (json.models) {
            const names = json.models.map(m => m.name.split('/').pop());
            const bestFlash = names.find(n => n.includes("flash") && !n.includes("8b")) || names[0];
            setActiveModel(bestFlash);
            return true;
          }
          return false;
        } catch (e) { return false; }
      };

      const handleLogin = async () => {
        if (!userApiKey) return showToast("API Key Required.");
        setIsLoading(true);
        try {
          const res = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'getPatients', passcode })
          });
          const json = await res.json();
          if (json.status === 'success') {
            const aiWorks = await checkApiCapabilities(userApiKey);
            if (aiWorks) {
              setPatients(json.data);
              setIsAuthenticated(true);
            } else showToast("Gemini API Key Invalid.");
          } else showToast("Invalid Clinic Passcode.");
        } catch (e) { showToast("Database Connection Error."); }
        setIsLoading(false);
      };

      const openPatient = async (p) => {
        setIsLoading(true);
        setSelectedPatient(p);
        try {
          const res = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'getPatientHistory', data: { patientName: p.name }, passcode })
          });
          const json = await res.json();
          if (json.status === 'success') {
            setHistory(json.data);
            setView('detail');
            setTranscript("");
            setCurrentSoap("");
            setCurrentHep([]);
            setHepPairs([{ id: Date.now(), start: null, end: null }]);
          }
        } catch (e) { showToast("Error loading patient data."); }
        setIsLoading(false);
      };

      const toggleRecording = async () => {
        if (!isRecording) {
          try {
            await navigator.mediaDevices.getUserMedia({ audio: true });
            setTranscript("");
            recognitionRef.current?.start();
            setIsRecording(true);
          } catch (e) { alert("Mic required."); }
        } else {
          recognitionRef.current?.stop();
          setIsRecording(false);
        }
      };

      const generateSOAP = async () => {
        if (!transcript) return showToast("Nothing recorded.");
        setIsLoading(true);
        try {
          const latestIntake = history.intakes.length > 0 ? history.intakes[history.intakes.length - 1].summary : "N/A";
          const prompt = `Act as an expert Physical Therapist. Generate a professional clinical SOAP note based on this transcript. 
          Context: ${latestIntake}
          Transcript: ${transcript}`;
          
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${activeModel}:generateContent?key=${userApiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
          });
          const json = await res.json();
          if (json.candidates?.[0]?.content?.parts?.[0]?.text) {
            setCurrentSoap(json.candidates[0].content.parts[0].text);
            showToast("Note Generated.");
          }
        } catch (e) { showToast(`AI Error: ${e.message}`); }
        setIsLoading(false);
      };

      const generateHEP = async () => {
        const validPairs = hepPairs.filter(p => p.start && p.end);
        if (validPairs.length === 0) return showToast("Upload both Start and End photos.");
        
        setIsLoading(true);
        try {
          const latestIntake = history.intakes.length > 0 ? history.intakes[history.intakes.length - 1].summary : "N/A";
          const parts = [{ text: `Act as a Physical Therapist. Create a structured JSON HEP guide for ${validPairs.length} exercises. Match the exercise photo pairs to what was taught in the session transcript: ${transcript}. Patient Background: ${latestIntake}. Output key "exercises" as array of objects: title, instructions, reps, cues. Respond ONLY JSON.` }];

          validPairs.forEach((pair, idx) => {
            parts.push({ text: `Ex ${idx+1} Start Position:` });
            parts.push({ inlineData: { mimeType: "image/png", data: pair.start.split(',')[1] } });
            parts.push({ text: `Ex ${idx+1} End Position:` });
            parts.push({ inlineData: { mimeType: "image/png", data: pair.end.split(',')[1] } });
          });

          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${activeModel}:generateContent?key=${userApiKey}`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts }], generationConfig: { responseMimeType: "application/json" } })
          });
          const json = await res.json();
          let rawText = json.candidates?.[0]?.content?.parts?.[0]?.text;
          const parsed = JSON.parse(rawText);
          
          const fullHepData = parsed.exercises.map((ex, i) => ({
            ...ex, photoStart: validPairs[i].start, photoEnd: validPairs[i].end
          }));

          setCurrentHep(fullHepData);
          showToast("Visual Program Created.");
        } catch (e) { showToast(`HEP Error: ${e.message}`); }
        setIsLoading(false);
      };

      const handlePhotoUpload = (index, phase, e) => {
        const file = e.target.files[0];
        if (!file) return;

        if (file.size > 10 * 1024 * 1024) {
          showToast("Image too large for browser memory. Try a smaller file.");
          return;
        }

        const r = new FileReader();
        r.onload = () => {
          setHepPairs(prev => {
            const next = [...prev];
            next[index] = { ...next[index], [phase]: r.result };
            return next;
          });
        };
        r.readAsDataURL(file);
      };

      const addExerciseSlot = () => {
        setHepPairs(prev => [...prev, { id: Date.now(), start: null, end: null }]);
      };

      const printHEP = () => {
        const win = window.open('', '_blank');
        win.document.write(`
          <html><head><title>HEP - ${selectedPatient.name}</title>
          <style>
            body{font-family:sans-serif;padding:40px;color:#1e293b;max-width:850px;margin:auto;}
            .card{display:flex;gap:20px;margin-bottom:40px;page-break-inside:avoid;border-bottom:2px solid #f1f5f9;padding-bottom:30px;}
            .p-box{flex:1;text-align:center;}
            .p-box img{width:100%;height:220px;object-fit:cover;border-radius:12px;border:1px solid #cbd5e1;}
            .title{font-size:22px;font-weight:bold;color:#2563eb;margin-bottom:5px;}
            .reps{font-weight:bold;color:#64748b;text-transform:uppercase;font-size:12px;margin-bottom:10px;}
            .instructions{font-size:14px;line-height:1.6;margin-bottom:10px;}
            .cues{background:#eff6ff;padding:12px;border-radius:8px;font-style:italic;border-left:4px solid #3b82f6;}
          </style></head>
          <body>
            <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:4px solid #3b82f6;margin-bottom:30px;padding-bottom:10px;">
                <h1>Home Exercise Program</h1>
                <p><b>Patient:</b> ${selectedPatient.name}</p>
            </div>
          ${currentHep.map(ex => `
            <div class="card">
                <div class="p-box"><img src="${ex.photoStart}"/><br/><small>START POSITION</small></div>
                <div class="p-box"><img src="${ex.photoEnd}"/><br/><small>END POSITION</small></div>
                <div style="flex:2">
                    <div class="title">${ex.title}</div>
                    <div class="reps">${ex.reps}</div>
                    <div class="instructions">${ex.instructions}</div>
                    <div class="cues"><b>Focus:</b> ${ex.cues}</div>
                </div>
            </div>`).join('')}
          </body></html>
        `);
        win.document.close();
        setTimeout(() => win.print(), 1000);
      };

      if (!isAuthenticated) return (
        <div className="h-screen flex items-center justify-center bg-slate-900 p-6 text-center">
          <div className="bg-white p-12 rounded-[3.5rem] shadow-2xl w-full max-w-md animate-in">
            <h1 className="text-3xl font-black mb-1 italic tracking-tighter">Clinic<span className="text-blue-600">Flow</span></h1>
            <p className="text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] mb-10 text-center">Secure Access • v{VERSION}</p>
            <div className="space-y-4">
              <input type="password" placeholder="Clinic Passcode" className="w-full p-4 rounded-2xl border-2 text-center font-bold bg-slate-50 outline-none focus:border-blue-500" value={passcode} onChange={e => setPasscode(e.target.value)} />
              <input type="password" placeholder="Gemini API Key" className="w-full p-4 rounded-2xl border-2 text-center text-xs font-mono bg-slate-50 outline-none focus:border-blue-500" value={userApiKey} onChange={e => setUserApiKey(e.target.value)} />
              <button onClick={handleLogin} className="w-full py-5 bg-blue-600 text-white rounded-[2rem] font-black uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-all">Verify & Enter</button>
            </div>
          </div>
        </div>
      );

      return view === 'list' ? (
        <div className="max-w-4xl mx-auto py-24 px-8 animate-in text-slate-800">
          <div className="flex justify-between items-center mb-16">
            <h1 className="text-5xl font-black tracking-tighter uppercase italic">Clinic<span className="text-blue-600">Flow</span></h1>
            <div className="bg-emerald-50 text-emerald-600 px-4 py-2 rounded-full text-[9px] font-black uppercase flex items-center gap-2">
              <span className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> Systems Active
            </div>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
            {patients.map(p => (
              <div key={p.name} onClick={()=>openPatient(p)} className="bg-white p-10 rounded-[3.5rem] shadow-sm border border-slate-100 hover:border-blue-500 hover:shadow-2xl transition-all cursor-pointer group active:scale-95">
                <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-[2rem] flex items-center justify-center font-black text-2xl mb-8 group-hover:bg-blue-600 group-hover:text-white transition-colors">{p.name[0]}</div>
                <h3 className="font-black text-2xl tracking-tight">{p.name}</h3>
                <p className="text-xs text-blue-500 font-bold uppercase tracking-widest mt-2">{p.email}</p>
              </div>
            ))}
          </div>
        </div>
      ) : (
        <div className="h-screen flex flex-col overflow-hidden animate-in">
          <header className="bg-white border-b px-8 py-4 flex justify-between items-center shrink-0">
            <div className="flex items-center gap-4">
              <button onClick={() => setView('list')} className="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-xl hover:bg-slate-100 transition-all"><Icon name="arrow-left"/></button>
              <div><h2 className="text-xl font-bold tracking-tight">{selectedPatient.name}</h2><p className="text-[10px] text-blue-500 uppercase font-bold tracking-widest">{selectedPatient.email}</p></div>
            </div>
            <div className="flex gap-2">
              <button onClick={toggleRecording} className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${isRecording ? 'bg-red-500 text-white shadow-lg' : 'bg-blue-600 text-white'}`}><Icon name={isRecording ? "square" : "mic"}/></button>
              {!isRecording && transcript && <button onClick={generateSOAP} disabled={isLoading} className="bg-slate-900 text-white px-6 py-2 h-10 rounded-xl text-xs font-bold uppercase shadow-lg disabled:opacity-50">Generate SOAP</button>}
            </div>
          </header>

          <main className="flex-1 flex overflow-hidden">
            <aside className="w-4/12 bg-white border-r p-6 overflow-y-auto custom-scrollbar">
              <h3 className="text-[10px] font-black uppercase text-slate-400 mb-4 tracking-widest">Clinical Baseline</h3>
              <div className="bg-slate-50 p-5 rounded-2xl text-sm leading-relaxed text-slate-600 mb-8 whitespace-pre-wrap border border-slate-100 shadow-inner">
                {history.intakes.length > 0 ? history.intakes[history.intakes.length - 1].summary : "No assessment found."}
              </div>
              <h3 className="text-[10px] font-black uppercase text-slate-400 mb-4 tracking-widest">Documentation Engine</h3>
              <div className="p-3 border border-slate-100 rounded-xl mb-3 text-[10px] font-bold text-blue-500 uppercase bg-blue-50 italic flex items-center gap-2"><Icon name="cpu" className="w-3 h-3"/> {activeModel}</div>
            </aside>

            <div className="flex-1 p-8 overflow-y-auto custom-scrollbar space-y-8 bg-slate-50/50">
              {isRecording && (
                <div className="bg-white p-12 rounded-[3rem] border-2 border-dashed border-red-200 flex flex-col items-center justify-center animate-in">
                  <div className={`w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mb-6 recording-pulse`}><Icon name="mic" className="w-8 h-8 text-red-600" /></div>
                  <h3 className="text-xl font-bold text-slate-800 tracking-tight text-center">Capturing Session Dialogue...</h3>
                  <p className="text-xs text-slate-400 italic mt-4 text-center max-w-sm">"{transcript.slice(-120) || 'Waiting for speech...'}"</p>
                </div>
              )}

              {currentSoap && (
                <div className="bg-white rounded-3xl border shadow-xl overflow-hidden animate-in">
                  <div className="p-4 border-b flex justify-between bg-white items-center">
                    <span className="text-xs font-black uppercase text-slate-400 tracking-widest">Generated SOAP Note</span>
                    <button onClick={()=>{
                      fetch(SCRIPT_URL, {method:'POST', body: JSON.stringify({action:'saveSoapNote', passcode, data:{patientName:selectedPatient.name, content:currentSoap}})})
                      .then(()=>showToast("Note Saved to Sheet"));
                    }} className="bg-emerald-600 text-white px-5 py-2 rounded-xl text-[10px] font-bold uppercase shadow-lg">Commit to Chart</button>
                  </div>
                  <textarea value={currentSoap} onChange={e=>setCurrentSoap(e.target.value)} className="w-full h-96 p-8 outline-none text-sm text-slate-700 leading-relaxed font-medium custom-scrollbar"/>
                </div>
              )}

              <div className="bg-white p-8 rounded-[2.5rem] border shadow-sm">
                <div className="flex justify-between items-center mb-8">
                  <h3 className="font-bold text-slate-800 tracking-tight">HEP Start/End Sequencer</h3>
                  <button onClick={addExerciseSlot} className="bg-blue-50 text-blue-600 px-5 py-2 rounded-xl text-[10px] font-bold uppercase flex items-center gap-2 hover:bg-blue-100 transition-all"><Icon name="plus" className="w-3 h-3"/> Add Exercise Slot</button>
                </div>
                
                <div className="space-y-6">
                  {hepPairs.map((pair, idx) => (
                    <div key={pair.id} className="bg-slate-50 p-6 rounded-3xl border border-slate-100 animate-in">
                      <div className="flex justify-between items-center mb-4">
                        <span className="text-[10px] font-black uppercase text-slate-400">Exercise {idx + 1}</span>
                        {idx > 0 && <button onClick={()=>setHepPairs(prev => prev.filter(p => p.id !== pair.id))} className="text-red-400 hover:text-red-600"><Icon name="trash-2" className="w-4 h-4"/></button>}
                      </div>
                      <div className="grid grid-cols-2 gap-6">
                        <div onClick={()=>document.getElementById(`start-${pair.id}`).click()} className="aspect-square bg-white border-2 border-dashed border-slate-200 rounded-2xl flex flex-col items-center justify-center cursor-pointer hover:bg-blue-50 transition-all overflow-hidden relative group">
                          {pair.start ? <img src={pair.start} className="w-full h-full object-cover"/> : <Icon name="camera" className="text-slate-300 w-8 h-8"/>}
                          <div className="absolute bottom-0 inset-x-0 bg-black/50 text-white text-[9px] font-bold uppercase py-1 text-center opacity-0 group-hover:opacity-100 transition-opacity">Start Pos</div>
                          <input id={`start-${pair.id}`} type="file" hidden accept="image/*" onChange={(e)=>handlePhotoUpload(idx, 'start', e)}/>
                        </div>
                        <div onClick={()=>document.getElementById(`end-${pair.id}`).click()} className="aspect-square bg-white border-2 border-dashed border-slate-200 rounded-2xl flex flex-col items-center justify-center cursor-pointer hover:bg-blue-50 transition-all overflow-hidden relative group">
                          {pair.end ? <img src={pair.end} className="w-full h-full object-cover"/> : <Icon name="camera" className="text-slate-300 w-8 h-8"/>}
                          <div className="absolute bottom-0 inset-x-0 bg-black/50 text-white text-[9px] font-bold uppercase py-1 text-center opacity-0 group-hover:opacity-100 transition-opacity">End Pos</div>
                          <input id={`end-${pair.id}`} type="file" hidden accept="image/*" onChange={(e)=>handlePhotoUpload(idx, 'end', e)}/>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>

                {hepPairs.some(p => p.start && p.end) && currentHep.length === 0 && (
                  <button onClick={generateHEP} disabled={isLoading} className="w-full mt-8 py-4 bg-slate-900 text-white rounded-2xl font-bold text-xs uppercase tracking-widest shadow-lg active:scale-[0.98] transition-all disabled:opacity-50">Construct Visual Guide</button>
                )}
              </div>

              {currentHep.length > 0 && (
                <div className="space-y-6 animate-in pb-20">
                  <div className="flex justify-between items-center">
                    <h3 className="text-xs font-black uppercase text-slate-400 tracking-widest">Program Review</h3>
                    <button onClick={printHEP} className="bg-blue-600 text-white px-6 py-2 rounded-xl text-[10px] font-bold uppercase shadow-lg flex items-center gap-2"><Icon name="printer" className="w-3 h-3"/> Print Handout</button>
                  </div>
                  <div className="grid grid-cols-1 gap-8">
                    {currentHep.map((ex, i) => (
                      <div key={i} className="bg-white rounded-[2.5rem] border border-blue-100 shadow-xl overflow-hidden p-8 transition-all hover:border-blue-400">
                        <div className="flex gap-4 mb-6">
                           <div className="flex-1"><img src={ex.photoStart} className="w-full aspect-square object-cover rounded-3xl border border-slate-100 shadow-sm"/><span className="text-[9px] font-black uppercase text-slate-300 block text-center mt-2">Start</span></div>
                           <div className="flex-1"><img src={ex.photoEnd} className="w-full aspect-square object-cover rounded-3xl border border-slate-100 shadow-sm"/><span className="text-[9px] font-black uppercase text-slate-300 block text-center mt-2">End</span></div>
                        </div>
                        <div className="space-y-4">
                          <input value={ex.title} onChange={(e) => {const n = [...currentHep]; n[i].title = e.target.value; setCurrentHep(n);}} className="text-2xl font-black text-blue-600 outline-none w-full bg-transparent" />
                          <input value={ex.reps} onChange={(e) => {const n = [...currentHep]; n[i].reps = e.target.value; setCurrentHep(n);}} className="font-bold text-slate-700 outline-none w-full bg-slate-50 p-3 rounded-xl text-sm" />
                          <textarea value={ex.instructions} onChange={(e) => {const n = [...currentHep]; n[i].instructions = e.target.value; setCurrentHep(n);}} className="text-sm text-slate-600 leading-relaxed outline-none w-full bg-transparent resize-none h-24" />
                          <textarea value={ex.cues} onChange={(e) => {const n = [...currentHep]; n[i].cues = e.target.value; setCurrentHep(n);}} className="text-sm text-blue-800 italic outline-none w-full bg-transparent resize-none h-12" />
                        </div>
                      </div>
                    ))}
                  </div>
                  <button onClick={()=>setCurrentHep([])} className="w-full py-4 text-[10px] font-black uppercase text-slate-400 hover:text-red-500 transition-colors">Clear and Restart</button>
                </div>
              )}
            </div>
          </main>
          {isLoading && <div className="fixed inset-0 bg-white/80 backdrop-blur-sm z-[300] flex items-center justify-center flex-col gap-4 font-black text-blue-600 animate-pulse tracking-widest uppercase text-[10px]"><Icon name="loader-2" className="animate-spin w-10 h-10"/> Synchronizing Intelligence...</div>}
          {statusMsg && <div className="fixed bottom-10 right-10 bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl z-[300] text-[10px] font-black uppercase border border-slate-700 animate-in tracking-widest leading-relaxed">{statusMsg}</div>}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

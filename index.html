<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClinicFlow | Professional Portal</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    body { background-color: #f8fafc; color: #1e293b; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .animate-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    @media print { .no-print { display: none !important; } .superbill-modal { position: absolute; top: 0; left: 0; width: 100%; border: none; } }
  </style>
</head>
<body>
  <div id="root">
    <div class="h-screen flex items-center justify-center bg-slate-50">
      <div class="text-center space-y-4">
        <div class="inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-sm font-bold text-slate-400 uppercase tracking-widest">Loading ClinicFlow v5.0...</p>
      </div>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const Icon = ({ name, className = "w-5 h-5" }) => {
      useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
      return <i data-lucide={name} className={className}></i>;
    };

    // --- CONFIGURATION ---
    const apiKey = "AIzaSyCLjWOKt1vhSSm9ScqLtJc_O18qf-QEnpM"; 
    // IMPORTANT: Paste your Google Web App URL (/exec) below
    const SCRIPT_URL = "PASTE_YOUR_WEBAPP_URL_HERE"; 
    const AI_MODEL = "gemini-1.5-flash";

    function App() {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [passcode, setPasscode] = useState("");
      const [view, setView] = useState('list');
      const [patients, setPatients] = useState([]);
      const [selectedPatient, setSelectedPatient] = useState(null);
      const [history, setHistory] = useState(null);
      const [isLoading, setIsLoading] = useState(false);
      const [statusMsg, setStatusMsg] = useState(null);

      // Session Data
      const [isRecording, setIsRecording] = useState(false);
      const [recordTime, setRecordTime] = useState(0);
      const [audioBase64, setAudioBase64] = useState(null);
      const [audioMime, setAudioMime] = useState("audio/webm");
      const [hepPhotos, setHepPhotos] = useState([]);
      const [currentSoap, setCurrentSoap] = useState("");
      const [generatedHEP, setGeneratedHEP] = useState(null);
      const [superbillData, setSuperbillData] = useState(null);

      const mediaRecorderRef = useRef(null);
      const audioChunksRef = useRef([]);
      const timerRef = useRef(null);

      const showToast = (msg) => {
        setStatusMsg(msg);
        setTimeout(() => setStatusMsg(null), 6000);
      };

      const callApi = async (action, data = {}) => {
        try {
          const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action, data, passcode })
          });
          const json = await response.json();
          if (json.status === 'error' && json.message === 'Unauthorized') {
             setIsAuthenticated(false);
             throw new Error("Invalid Passcode");
          }
          return json;
        } catch (e) {
          alert("Database Error: " + e.message);
          return { status: 'error' };
        }
      };

      const handleLogin = async () => {
        setIsLoading(true);
        const res = await callApi('getPatients');
        if (res.status === 'success') {
          setPatients(res.data);
          setIsAuthenticated(true);
        }
        setIsLoading(false);
      };

      const openPatient = async (p) => {
        setIsLoading(true);
        setSelectedPatient(p);
        const res = await callApi('getPatientHistory', { patientName: p.name });
        if (res.status === 'success') {
          setHistory(res.data);
          setView('detail');
        }
        setIsLoading(false);
      };

      const toggleRecording = async () => {
        if (!isRecording) {
          try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
            setAudioMime(mimeType);

            mediaRecorderRef.current = new MediaRecorder(stream, { mimeType });
            audioChunksRef.current = [];
            mediaRecorderRef.current.ondataavailable = (e) => { if (e.data.size > 0) audioChunksRef.current.push(e.data); };
            mediaRecorderRef.current.onstop = () => {
              const blob = new Blob(audioChunksRef.current, { type: mimeType });
              const reader = new FileReader();
              reader.readAsDataURL(blob);
              reader.onloadend = () => {
                setAudioBase64(reader.result.split(',')[1]);
                showToast("Recording processed.");
              };
              stream.getTracks().forEach(t => t.stop());
            };
            mediaRecorderRef.current.start();
            setIsRecording(true);
            timerRef.current = setInterval(() => setRecordTime(p => p + 1), 1000);
          } catch (e) { alert("Mic required for session documentation."); }
        } else {
          if (mediaRecorderRef.current && mediaRecorderRef.current.state !== "inactive") mediaRecorderRef.current.stop();
          setIsRecording(false);
          clearInterval(timerRef.current);
          setRecordTime(0);
        }
      };

      // FINAL STABLE AI CALLER
      const callGemini = async (prompt, isJson = false) => {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${AI_MODEL}:generateContent?key=${apiKey}`;
        const payload = {
          contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: audioMime, data: audioBase64 } }] }]
        };
        if (isJson) payload.generationConfig = { responseMimeType: "application/json" };

        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const json = await res.json();
        if (!res.ok) throw new Error(json.error?.message || "AI Connection Failed");
        return json.candidates[0].content.parts[0].text;
      };

      const generateSOAP = async () => {
        if (!audioBase64) return showToast("No session audio captured.");
        setIsLoading(true);
        try {
          const text = await callGemini("Write a professional Physical Therapy SOAP note based on the clinical audio provided. Structure with S, O, A, P. No intro.");
          setCurrentSoap(text);
          showToast("SOAP Note Ready.");
        } catch (e) { showToast(`AI Error: ${e.message}`); }
        setIsLoading(false);
      };

      const generateSuperbill = async () => {
        if (!audioBase64) return showToast("No session audio captured.");
        setIsLoading(true);
        try {
          const rawText = await callGemini("Identify CPT codes and justifications. Return JSON: { \"codes\": [{ \"code\": \"...\", \"desc\": \"...\", \"justification\": \"...\" }] }", true);
          const data = JSON.parse(rawText.replace(/```json|```/g, "").trim());
          const subtotal = data.codes.length * 70;
          setSuperbillData({ ...data, subtotal, adjustment: subtotal - 250, total: 250, date: new Date().toLocaleDateString(), invoiceId: `INV-${Date.now().toString().slice(-4)}` });
        } catch (e) { showToast(`Billing Error: ${e.message}`); }
        setIsLoading(false);
      };

      if (!isAuthenticated) return (
        <div className="h-screen flex items-center justify-center bg-slate-900 p-6">
          <div className="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-sm">
            <h1 className="text-3xl font-black mb-1 italic tracking-tighter">Clinic<span className="text-blue-600">Flow</span></h1>
            <p className="text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] mb-8 text-center">Secure Clinician Portal</p>
            <input type="password" placeholder="Passcode" className="w-full p-4 rounded-2xl border-2 mb-4 text-center font-bold outline-none focus:border-blue-500" value={passcode} onChange={e => setPasscode(e.target.value)} />
            <button onClick={handleLogin} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg active:scale-95 transition-all">Enter</button>
          </div>
        </div>
      );

      return view === 'list' ? (
        <div className="max-w-4xl mx-auto py-24 px-8 animate-in text-slate-800">
          <div className="flex justify-between items-center mb-16">
            <h1 className="text-5xl font-black tracking-tighter uppercase italic">Clinic<span className="text-blue-600">Flow</span></h1>
            <button onClick={() => handleLogin()} className="p-4 bg-white border border-slate-200 rounded-[2rem] shadow-sm hover:shadow-lg transition-all active:scale-90"><Icon name="refresh-cw" className={isLoading ? "animate-spin text-blue-600" : ""}/></button>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
            {patients.map(p => (
              <div key={p.name} onClick={()=>openPatient(p)} className="bg-white p-10 rounded-[3.5rem] shadow-sm border border-slate-100 hover:border-blue-500 hover:shadow-2xl transition-all cursor-pointer group active:scale-95">
                <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-[2rem] flex items-center justify-center font-black text-2xl mb-8 group-hover:bg-blue-600 group-hover:text-white transition-colors">{p.name[0]}</div>
                <h3 className="font-black text-2xl text-slate-800 tracking-tight">{p.name}</h3>
                <p className="text-xs text-blue-500 font-bold uppercase tracking-widest mt-2">{p.email}</p>
              </div>
            ))}
          </div>
        </div>
      ) : (
        <div className="h-screen flex flex-col overflow-hidden animate-in">
          <header className="bg-white border-b px-8 py-4 flex justify-between items-center shrink-0">
            <div className="flex items-center gap-4">
              <button onClick={() => setView('list')} className="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-xl hover:bg-slate-100 transition-all"><Icon name="arrow-left"/></button>
              <div><h2 className="text-xl font-bold">{selectedPatient.name}</h2><p className="text-[10px] text-blue-500 font-bold uppercase">{selectedPatient.email}</p></div>
            </div>
            <div className="flex gap-3">
              <button onClick={toggleRecording} className={`px-6 py-2 rounded-xl flex items-center gap-3 transition-all ${isRecording ? 'bg-red-500 text-white shadow-lg' : 'bg-blue-600 text-white shadow-md'}`}>
                <Icon name={isRecording ? "square" : "mic"} className="w-4 h-4"/><span className="font-bold text-xs uppercase tracking-widest">{isRecording ? "Stop Capture" : "Start Record"}</span>
              </button>
              <button onClick={generateSOAP} disabled={!audioBase64 || isLoading} className="bg-slate-900 text-white px-6 py-2 rounded-xl text-xs font-bold uppercase shadow-lg disabled:opacity-30 transition-all">Generate SOAP</button>
            </div>
          </header>

          <main className="flex-1 flex overflow-hidden">
            <aside className="w-4/12 bg-white border-r p-6 overflow-y-auto custom-scrollbar">
              <h3 className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-4">Assessment Baseline</h3>
              <div className="bg-slate-50 p-5 rounded-2xl text-sm leading-relaxed text-slate-600 mb-8 whitespace-pre-wrap border border-slate-100 shadow-inner">{history?.intakes?.[0]?.summary || "No intake found."}</div>
              <h3 className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-4">Past Sessions</h3>
              {history?.soapNotes?.map((n, i) => (<div key={i} className="p-3 border border-slate-100 rounded-xl mb-3 text-xs italic text-slate-500 bg-white">"{n.content}"</div>))}
            </aside>

            <div className="flex-1 p-8 overflow-y-auto custom-scrollbar space-y-8 bg-slate-50/50">
              {currentSoap && (
                <div className="bg-white rounded-3xl border shadow-xl overflow-hidden animate-in">
                  <div className="p-4 border-b flex justify-between bg-white items-center"><span className="text-xs font-black uppercase text-slate-400 tracking-widest">Clinical Review</span><button onClick={()=>callApi('saveSoapNote', {patientName: selectedPatient.name, content: currentSoap}).then(()=>showToast("Note Logged"))} className="bg-emerald-600 text-white px-5 py-2 rounded-xl text-[10px] font-bold uppercase shadow-lg">Save to Sheet</button></div>
                  <textarea value={currentSoap} onChange={e=>setCurrentSoap(e.target.value)} className="w-full h-80 p-8 outline-none text-sm text-slate-700 leading-relaxed font-medium custom-scrollbar"/>
                </div>
              )}

              <div className="bg-white p-8 rounded-[2.5rem] border shadow-sm">
                <div className="flex justify-between items-center mb-8">
                  <h3 className="font-bold text-slate-800 tracking-tight">HEP Sequencer</h3>
                  <button onClick={()=>document.getElementById('upl').click()} className="bg-blue-50 text-blue-600 px-5 py-2 rounded-xl text-[10px] font-bold uppercase flex items-center gap-2 hover:bg-blue-100 transition-all"><Icon name="camera" className="w-3 h-3"/> Upload Position</button>
                  <input id="upl" type="file" hidden multiple onChange={e=>{ Array.from(e.target.files).forEach(f=>{const r=new FileReader(); r.onload=()=>setHepPhotos(p=>[...p,r.result]); r.readAsDataURL(f)})}}/>
                </div>
                <div className="grid grid-cols-4 gap-4 mb-6">
                  {hepPhotos.map((p, i) => <div key={i} className="relative group animate-in"><img src={p} className="aspect-square object-cover rounded-2xl border border-slate-100 shadow-sm"/><button onClick={()=>setHepPhotos(prev=>prev.filter((_, idx)=>idx!==i))} className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity shadow-lg"><Icon name="x" className="w-3 h-3"/></button></div>)}
                </div>
                <button className="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold text-xs uppercase tracking-widest shadow-lg active:scale-[0.98] transition-all">Construct Program Guide</button>
              </div>

              <div className="grid grid-cols-3 gap-6">
                <button onClick={generateSuperbill} disabled={!audioBase64 || isLoading} className="bg-white border border-slate-200 p-8 rounded-[2.5rem] flex flex-col items-center gap-4 hover:border-blue-400 hover:shadow-xl transition-all group active:scale-95 shadow-sm disabled:opacity-30">
                  <div className="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center text-slate-400 group-hover:bg-blue-600 group-hover:text-white transition-colors"><Icon name="file-badge"/></div>
                  <span className="text-[10px] font-bold uppercase text-slate-500 text-center">Generate Superbill</span>
                </button>
              </div>
            </div>
          </main>

          {superbillData && (
            <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md z-[200] flex items-center justify-center p-4 no-print">
              <div className="bg-white w-full max-w-2xl rounded-[3rem] shadow-2xl overflow-hidden animate-in superbill-modal">
                <div className="p-6 border-b flex justify-between items-center bg-slate-50"><h3 className="font-bold text-[10px] uppercase tracking-widest">Superbill Preview</h3><div className="flex gap-2"><button onClick={() => window.print()} className="bg-blue-600 text-white px-5 py-2 rounded-xl text-xs font-bold uppercase flex items-center gap-2 shadow-lg"><Icon name="printer" className="w-3 h-3"/> Print</button><button onClick={() => setSuperbillData(null)} className="bg-white border px-5 py-2 rounded-xl text-xs font-bold uppercase">Close</button></div></div>
                <div className="p-16 bg-white text-black font-serif">
                   <div className="flex justify-between mb-12 font-sans text-slate-900">
                     <h1 className="text-xl font-black uppercase tracking-tight">ClinicFlow Physical Therapy</h1>
                     <div className="text-right"><h2 className="text-3xl font-black text-slate-100 uppercase italic">Superbill</h2><p className="text-[10px] font-bold text-slate-400 mt-2">Date: {superbillData.date}</p></div>
                   </div>
                   <table className="w-full border-t-2 border-black mb-8 font-sans">
                     <thead><tr className="text-left text-[10px] uppercase font-black"><th className="py-3">CPT Code</th><th className="py-3">Description</th><th className="py-3 text-right">Fee</th></tr></thead>
                     <tbody>{superbillData.codes.map((c, i) => (<tr key={i} className="border-t border-slate-100 font-sans"><td className="py-4 font-bold text-sm">{c.code}</td><td className="py-4 pr-6 leading-relaxed"><b>{c.desc}</b><br/><span className="text-[10px] italic text-slate-500 leading-tight">{c.justification}</span></td><td className="py-4 text-right font-mono text-sm">$70.00</td></tr>))}</tbody>
                   </table>
                   <div className="flex justify-end flex-col items-end font-sans">
                     <p className="text-xs text-slate-400 mb-1">Subtotal: ${superbillData.subtotal.toFixed(2)}</p>
                     <p className="text-xs text-emerald-600 font-bold mb-2 tracking-widest uppercase">Self-Pay Adj: -${superbillData.adjustment.toFixed(2)}</p>
                     <div className="text-2xl font-black border-t-4 border-black pt-2">Total Paid: $250.00</div>
                   </div>
                </div>
              </div>
            </div>
          )}
          {isLoading && <div className="fixed inset-0 bg-white/80 backdrop-blur-sm z-[300] flex items-center justify-center flex-col gap-4 font-black text-blue-600 animate-pulse tracking-[0.3em] uppercase text-[10px]"><Icon name="loader-2" className="animate-spin w-10 h-10 mb-2"/> Processing AI Pipeline...</div>}
          {statusMsg && <div className="fixed bottom-10 right-10 bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl z-[300] text-[10px] font-black uppercase border border-slate-700 animate-in tracking-widest">{statusMsg}</div>}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClinicFlow | Professional Portal</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    body { background-color: #f8fafc; color: #1e293b; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .animate-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const Icon = ({ name, className = "w-5 h-5" }) => {
      useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
      return <i data-lucide={name} className={className}></i>;
    };

    // --- CONFIGURATION ---
    const apiKey = "AIzaSyCW-UgXFZpbdqp1Cu-k691q7h_nvZu7ovY"; 
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzuebIKaOUaautJwjjofHMQmuLiJRUy3CP4yRXL42pf7d2spujhvBhu16NnZZA2pJkNdw/exec"; 

    function App() {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [passcode, setPasscode] = useState("");
      const [view, setView] = useState('list');
      const [patients, setPatients] = useState([]);
      const [selectedPatient, setSelectedPatient] = useState(null);
      const [history, setHistory] = useState(null);
      const [isLoading, setIsLoading] = useState(false);
      const [statusMsg, setStatusMsg] = useState(null);

      // Session States
      const [isRecording, setIsRecording] = useState(false);
      const [audioUrl, setAudioUrl] = useState(null); // NEW: Visual playback
      const [audioBase64, setAudioBase64] = useState(null);
      const [audioMime, setAudioMime] = useState("audio/webm");
      const [currentSoap, setCurrentSoap] = useState("");

      const mediaRecorderRef = useRef(null);
      const audioChunksRef = useRef([]);

      const showToast = (msg) => {
        setStatusMsg(msg);
        setTimeout(() => setStatusMsg(null), 6000);
      };

      const callApi = async (action, data = {}) => {
        try {
          const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action, data, passcode })
          });
          const json = await response.json();
          return json;
        } catch (e) {
          alert("Database Error: Check your SCRIPT_URL");
          return { status: 'error' };
        }
      };

      const handleLogin = async () => {
        setIsLoading(true);
        const res = await callApi('getPatients');
        if (res.status === 'success') {
          setPatients(res.data);
          setIsAuthenticated(true);
        }
        setIsLoading(false);
      };

      const openPatient = async (p) => {
        setIsLoading(true);
        setSelectedPatient(p);
        const res = await callApi('getPatientHistory', { patientName: p.name });
        if (res.status === 'success') {
          setHistory(res.data);
          setView('detail');
        }
        setIsLoading(false);
      };

      const toggleRecording = async () => {
        if (!isRecording) {
          try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
            setAudioMime(mimeType);

            mediaRecorderRef.current = new MediaRecorder(stream, { mimeType });
            audioChunksRef.current = [];
            
            mediaRecorderRef.current.ondataavailable = (e) => audioChunksRef.current.push(e.data);
            
            mediaRecorderRef.current.onstop = () => {
              const blob = new Blob(audioChunksRef.current, { type: mimeType });
              const url = URL.createObjectURL(blob);
              setAudioUrl(url); // Sets visual player

              const reader = new FileReader();
              reader.readAsDataURL(blob);
              reader.onloadend = () => {
                setAudioBase64(reader.result.split(',')[1]);
                showToast("Recording saved to memory. Ready for AI.");
              };
              stream.getTracks().forEach(t => t.stop());
            };

            mediaRecorderRef.current.start();
            setIsRecording(true);
          } catch (e) { alert("Mic Error: " + e.message); }
        } else {
          mediaRecorderRef.current.stop();
          setIsRecording(false);
        }
      };

      const callGemini = async (prompt) => {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
        const payload = {
          contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: audioMime, data: audioBase64 } }] }]
        };
        const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const json = await res.json();
        if (!res.ok) throw new Error(json.error?.message || "AI Error");
        return json.candidates[0].content.parts[0].text;
      };

      const generateSOAP = async () => {
        if (!audioBase64) return showToast("No recording found.");
        setIsLoading(true);
        try {
          const text = await callGemini("Write a professional PT/MLD SOAP note from this audio.");
          setCurrentSoap(text);
          showToast("SOAP Note Generated.");
        } catch (e) { showToast(`AI Error: ${e.message}`); }
        setIsLoading(false);
      };

      if (!isAuthenticated) return (
        <div className="h-screen flex items-center justify-center bg-slate-900">
          <div className="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-sm">
            <h1 className="text-3xl font-black mb-8 italic tracking-tighter">Clinic<span className="text-blue-600">Flow</span></h1>
            <input type="password" placeholder="Passcode" className="w-full p-4 rounded-2xl border-2 mb-4 text-center" value={passcode} onChange={e => setPasscode(e.target.value)} />
            <button onClick={handleLogin} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold uppercase">Enter</button>
          </div>
        </div>
      );

      return view === 'list' ? (
        <div className="max-w-4xl mx-auto py-24 px-8 animate-in text-slate-800">
          <h1 className="text-5xl font-black tracking-tighter uppercase italic mb-12">Clinic<span className="text-blue-600">Flow</span></h1>
          <div className="grid grid-cols-2 gap-8">
            {patients.map(p => (
              <div key={p.name} onClick={()=>openPatient(p)} className="bg-white p-10 rounded-[3.5rem] shadow-sm border border-slate-100 hover:shadow-xl transition-all cursor-pointer">
                <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-[2rem] flex items-center justify-center font-black text-2xl mb-4">{p.name[0]}</div>
                <h3 className="font-black text-2xl">{p.name}</h3>
                <p className="text-xs text-blue-500 font-bold uppercase">{p.email}</p>
              </div>
            ))}
          </div>
        </div>
      ) : (
        <div className="h-screen flex flex-col animate-in">
          <header className="bg-white border-b px-8 py-4 flex justify-between items-center">
            <button onClick={() => setView('list')} className="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-xl"><Icon name="arrow-left"/></button>
            <div className="flex gap-4 items-center">
              {audioUrl && <audio src={audioUrl} controls className="h-8 w-48 no-print" />}
              <button onClick={toggleRecording} className={`px-6 py-2 rounded-xl flex items-center gap-3 ${isRecording ? 'bg-red-500 text-white' : 'bg-blue-600 text-white'}`}>
                <Icon name={isRecording ? "square" : "mic"}/>
                <span className="font-bold text-xs uppercase">{isRecording ? "Stop" : "Record"}</span>
              </button>
              <button onClick={generateSOAP} className="bg-slate-900 text-white px-6 py-2 rounded-xl text-xs font-bold uppercase">Generate SOAP</button>
            </div>
          </header>

          <main className="flex-1 flex overflow-hidden">
            <aside className="w-4/12 bg-white border-r p-6 overflow-y-auto">
              <h3 className="text-[10px] font-black uppercase text-slate-400 mb-4">Latest Intake</h3>
              <div className="bg-slate-50 p-5 rounded-2xl text-sm leading-relaxed whitespace-pre-wrap">{history?.intakes?.[0]?.summary || "No data."}</div>
            </aside>
            <div className="flex-1 p-8 overflow-y-auto bg-slate-50/50">
              {currentSoap && (
                <div className="bg-white rounded-3xl border shadow-xl p-8 animate-in">
                  <textarea value={currentSoap} onChange={e=>setCurrentSoap(e.target.value)} className="w-full h-96 outline-none text-sm leading-relaxed custom-scrollbar"/>
                </div>
              )}
            </div>
          </main>
          {isLoading && <div className="fixed inset-0 bg-white/80 backdrop-blur-sm z-[300] flex items-center justify-center flex-col font-black text-blue-600 uppercase text-[10px] animate-pulse"><Icon name="loader-2" className="animate-spin w-10 h-10 mb-2"/> Processing AI...</div>}
          {statusMsg && <div className="fixed bottom-10 right-10 bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl z-[300] text-[10px] font-black uppercase animate-in">{statusMsg}</div>}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
